name: Cron Job

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ./web/package.json
          run_install: |
            - cwd: ./web

      # GitHub traffic update: runs on the runner using GHA secrets for GitHub App
      # credentials, then writes to the DB via the DATABASE_URL fetched from Azure.
      # NOTE: the DATABASE_URL hostname 'postgres' only resolves inside the
      # Container Apps environment, so this step will be unable to write to the DB.
      # A future improvement is to move this to an in-container API route too.
      - name: Fetch DATABASE_URL from Container App
        run: |
          DB=$(az containerapp secret show \
            --name repohistory \
            --resource-group repohistory-rg \
            --secret-name database-url \
            --query "value" -o tsv)
          echo "DATABASE_URL=$DB" >> $GITHUB_ENV

      - name: Run GitHub traffic update
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        working-directory: ./web
        run: pnpm tsx src/cron-traffic.ts

      # NuGuard stats update: runs inside the Container App where the internal
      # 'postgres' hostname resolves, via an authenticated API route.
      - name: Trigger NuGuard stats update via Container App
        run: |
          SITE_URL=$(az containerapp show \
            --name repohistory \
            --resource-group repohistory-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          RESPONSE=$(curl -sf -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://${SITE_URL}/api/cron/nuguard")
          echo "NuGuard update response: $RESPONSE"
