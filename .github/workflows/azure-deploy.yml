name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_CONTAINER_APP_NAME: repohistory
  AZURE_RESOURCE_GROUP: repohistory-rg
  ACR_NAME: repohistoryacr
  ACR_LOGIN_SERVER: repohistoryacr.azurecr.io
  IMAGE: repohistoryacr.azurecr.io/repohistory
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to Azure ──────────────────────────────────────────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Push image to ACR using managed identity (az acr login) ───────────
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Build & push Docker image ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      # ── Register NuGuard integration secrets ──────────────────────────────
      # Idempotent: sets Cloudflare + GA4 secrets on every deploy.
      # If the GitHub secret is empty the Container App secret is set to an
      # empty string, which is harmless — the cron fetchers skip gracefully.
      - name: Set NuGuard and cron secrets on Container App
        run: |
          az containerapp secret set \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              "cloudflare-api-token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "cloudflare-zone-id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
              "ga4-property-id=${{ secrets.GA4_PROPERTY_ID }}" \
              "ga4-service-account-json=${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}" \
              "cron-secret=${{ secrets.CRON_SECRET }}"

      # ── Deploy updated image to Container Apps ─────────────────────────────
      - name: Set local auth secrets on Container App
        run: |
          az containerapp secret set \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              "local-auth-github-token=${{ secrets.LOCAL_AUTH_GITHUB_TOKEN }}"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --set-env-vars \
              "CLOUDFLARE_API_TOKEN=secretref:cloudflare-api-token" \
              "CLOUDFLARE_ZONE_ID=secretref:cloudflare-zone-id" \
              "GA4_PROPERTY_ID=secretref:ga4-property-id" \
              "GA4_SERVICE_ACCOUNT_JSON=secretref:ga4-service-account-json" \
              "CRON_SECRET=secretref:cron-secret" \
              "ADMIN_GITHUB_LOGINS=${{ secrets.ADMIN_GITHUB_LOGINS }}" \
              "LOCAL_AUTH_GITHUB_TOKEN=secretref:local-auth-github-token"
